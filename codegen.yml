overwrite: true
schema: './api/schema.graphql'
documents: 'src/**/*.graphql'
generates:
  src/lib/graphql/types.ts:
    plugins:
      - 'typescript'
  src/lib/graphql/index.generated.ts:
    config:
      useTypeImports: true
    plugins:
      - 'typescript-operations'
      - 'typescript-graphql-request'
  src/lib/graphql/graphql.schema.json:
    plugins:
      - 'introspection'
